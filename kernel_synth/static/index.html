<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kernel-synth · RL environment buffer</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/atom-one-dark.min.css"
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237c5cff'/%3E%3Ctext x='50%25' y='56%25' font-size='18' text-anchor='middle' fill='white' font-family='monospace' font-weight='700'%3Eks%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div class="aurora"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">ks</span>
        <div class="brand-text">
          <h1>kernel-synth</h1>
          <p>RL environment buffer · custom-kernel candidates</p>
        </div>
      </div>
      <div class="topbar-stats" id="topbar-stats"></div>
    </header>

    <main class="layout">
      <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-head">
          <h2>Repositories</h2>
          <span class="muted" id="repo-count">—</span>
        </div>
        <div class="search">
          <input
            id="search"
            type="search"
            placeholder="filter modules, tags, or repos…"
            autocomplete="off"
          />
        </div>
        <ul class="repo-list" id="repo-list"></ul>
      </aside>

      <section class="content" id="content">
        <div class="placeholder glass" id="placeholder">
          <h3>Pick a repository</h3>
          <p>
            Run the pipeline first:
            <code>python -m kernel_synth.scripts.seed_repos</code>
          </p>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/languages/python.min.js"
      defer
    ></script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
